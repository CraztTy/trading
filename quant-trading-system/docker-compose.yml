version: '3.8'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-defaults: &default-service
  logging: *default-logging
  restart: unless-stopped
  networks:
    - quant-network

networks:
  quant-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mysql-data:
  redis-data:
  clickhouse-data:
  prometheus-data:
  grafana-data:
  loki-data:

services:
  # ==================== 数据库服务 ====================
  mysql:
    <<: *default-service
    image: mysql:8.0
    container_name: quant-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-quant_trading}
      MYSQL_USER: ${DB_USER:-quant_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-quant123}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./configs/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./configs/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    <<: *default-service
    image: redis:7.0-alpine
    container_name: quant-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./configs/redis/redis.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  clickhouse:
    <<: *default-service
    image: clickhouse/clickhouse-server:latest
    container_name: quant-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-quant_data}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse123}
    ports:
      - "${CLICKHOUSE_PORT:-9000}:9000"
      - "8123:8123"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./configs/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ./configs/clickhouse/users.xml:/etc/clickhouse-server/users.xml
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ==================== 消息队列服务 ====================
  zookeeper:
    <<: *default-service
    image: confluentinc/cp-zookeeper:latest
    container_name: quant-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    <<: *default-service
    image: confluentinc/cp-kafka:latest
    container_name: quant-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  rabbitmq:
    <<: *default-service
    image: rabbitmq:3.11-management-alpine
    container_name: quant-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "15672:15672"
    volumes:
      - ./configs/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ./configs/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json

  # ==================== 监控服务 ====================
  prometheus:
    <<: *default-service
    image: prom/prometheus:latest
    container_name: quant-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/rules.yml:/etc/prometheus/rules.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'

  grafana:
    <<: *default-service
    image: grafana/grafana:latest
    container_name: quant-grafana
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources

  loki:
    <<: *default-service
    image: grafana/loki:latest
    container_name: quant-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - ./monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml

  promtail:
    <<: *default-service
    image: grafana/promtail:latest
    container_name: quant-promtail
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/loki/promtail-config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml

  # ==================== 应用服务 ====================
  api:
    <<: *default-service
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: development
    container_name: quant-api
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_started
    environment:
      - APP_ENV=development
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - CLICKHOUSE_HOST=clickhouse
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - RABBITMQ_HOST=rabbitmq
    ports:
      - "8000:8000"
      - "8001:8001"  # Prometheus metrics
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    <<: *default-service
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
      target: development
    container_name: quant-worker
    depends_on:
      - api
      - redis
      - rabbitmq
    environment:
      - APP_ENV=development
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
    command: celery -A src.worker.celery_app worker --loglevel=info

  scheduler:
    <<: *default-service
    build:
      context: .
      dockerfile: docker/scheduler.Dockerfile
      target: development
    container_name: quant-scheduler
    depends_on:
      - api
      - redis
    environment:
      - APP_ENV=development
      - REDIS_HOST=redis
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
    command: python src/scheduler/main.py

  # ==================== 工具服务 ====================
  adminer:
    <<: *default-service
    image: adminer:latest
    container_name: quant-adminer
    depends_on:
      - mysql
      - clickhouse
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql

  jaeger:
    <<: *default-service
    image: jaegertracing/all-in-one:latest
    container_name: quant-jaeger
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # ==================== 数据服务 ====================
  data-importer:
    <<: *default-service
    build:
      context: .
      dockerfile: docker/data-importer.Dockerfile
    container_name: quant-data-importer
    depends_on:
      - mysql
      - redis
      - clickhouse
    environment:
      - APP_ENV=development
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - CLICKHOUSE_HOST=clickhouse
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
      - ./data:/app/data
    command: python src/data/importer/main.py

  # ==================== 前端服务 ====================
  web:
    <<: *default-service
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: development
    container_name: quant-web
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev