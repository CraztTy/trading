<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睿之兮 | L3量化交易系统</title>
    <meta name="description" content="睿之兮 - L3级别AI量化交易系统，三省六部架构，智能策略引擎">

    <!-- 预连接 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
      /* 初始加载动画 */
      body {
        margin: 0;
        background: #020202;
      }

      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #020202;
        z-index: 99999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      #loading.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .loading-content {
        text-align: center;
      }

      .loading-logo {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 2rem;
        font-weight: 600;
        color: #00f0ff;
        text-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
        letter-spacing: 0.1em;
        margin-bottom: 1rem;
      }

      .loading-bar {
        width: 200px;
        height: 2px;
        background: rgba(0, 240, 255, 0.1);
        margin: 0 auto;
        overflow: hidden;
        position: relative;
      }

      .loading-bar::after {
        content: '';
        position: absolute;
        left: -50%;
        top: 0;
        width: 50%;
        height: 100%;
        background: linear-gradient(90deg, transparent, #00f0ff, transparent);
        animation: loading 1.5s ease-in-out infinite;
      }

      @keyframes loading {
        0% { left: -50%; }
        100% { left: 150%; }
      }

      .loading-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.625rem;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 0.2em;
        margin-top: 1rem;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <!-- 加载动画 -->
    <div id="loading">
      <div class="loading-content">
        <div class="loading-logo">◈ 睿之兮</div>
        <div class="loading-bar"></div>
        <div class="loading-text">Initializing L3 Quant System...</div>
      </div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>

    <script>
      // 页面加载完成后隐藏加载动画
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loading = document.getElementById('loading');
          if (loading) {
            loading.classList.add('hidden');
          }
        }, 800);
      });
    </script>
  </body>
</html>
