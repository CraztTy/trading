version: '3.8'

# 开发环境 Docker Compose 配置
# 仅包含核心依赖：PostgreSQL + Redis

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: quant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: quant_trading
      POSTGRES_USER: quant_user
      POSTGRES_PASSWORD: quant_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant_user -d quant_trading"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quant-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: quant-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quant-network

  # pgAdmin - PostgreSQL 管理工具（可选）
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: quant-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@quant.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - quant-network

volumes:
  postgres_data:
  redis_data:

networks:
  quant-network:
    driver: bridge
